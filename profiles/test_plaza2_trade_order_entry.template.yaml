version: 1
profile_id: test_plaza2_trade_order_entry
environment: test
armed: false
test_network_armed_required: true
test_session_armed_required: true
test_plaza2_armed_required: true
test_order_entry_armed_required: true
test_tiny_order_armed_required: true
send_test_order_required_for_live: true
profile_neutral_coverage: true
broker_topology:
  mode: broker_router
  order_path: plaza2_trade
  market_data_path: optional_aggr20_sanity
  router_location: unknown
shadow_mode:
  enabled: false
  primary_source: native_moex
  native_connectors_read_only: false
connectors:
  market_data: []
  orders:
    - plaza2_trade
  state:
    - plaza2_repl
plaza2_trade_test_order_entry:
  enabled: false
  live_enabled_commands:
    - AddOrder
    - DelOrder
  live_disabled_commands:
    - IcebergAddOrder
    - IcebergDelOrder
    - MoveOrder
    - IcebergMoveOrder
    - DelUserOrders
    - DelOrdersByBFLimit
    - CODHeartbeat
  endpoint:
    host: TEST_PLAZA2_ENDPOINT_HOST_PLACEHOLDER
    port: 4001
  runtime:
    root: PLAZA2_RUNTIME_ROOT_PLACEHOLDER
    library_path: ""
    scheme_dir: ""
    config_dir: ""
    env_open_settings: ini=config/t1.ini;key=${MOEX_PLAZA2_CGATE_SOFTWARE_KEY}
    expected_spectra_release: SPECTRA93
    expected_scheme_sha256: ""
  software_key:
    source: env
    env_var: MOEX_PLAZA2_CGATE_SOFTWARE_KEY
  credentials:
    source: none
  session:
    connection_settings: p2tcp://TEST_PLAZA2_ENDPOINT_HOST_PLACEHOLDER:4001;app_name=connectors_phase5e_trade
    connection_open_settings: ""
    process_timeout_ms: 50
  publisher:
    settings: p2mq://FORTS_SRV;category=FORTS_MSG;name=connectors_phase5e_trade_pub;scheme=|FILE|scheme/forts_scheme.ini|message
    open_settings: ""
  stream_open_settings: ""
  private_streams:
    FORTS_TRADE_REPL:
      settings: p2repl://FORTS_TRADE_REPL;scheme=|FILE|scheme/forts_scheme.ini|FORTS_TRADE_REPL
    FORTS_USERORDERBOOK_REPL:
      settings: p2repl://FORTS_USERORDERBOOK_REPL;scheme=|FILE|scheme/forts_scheme.ini|FORTS_USERORDERBOOK_REPL
    FORTS_POS_REPL:
      settings: p2repl://FORTS_POS_REPL;scheme=|FILE|scheme/forts_scheme.ini|FORTS_POS_REPL
    FORTS_PART_REPL:
      settings: p2repl://FORTS_PART_REPL;scheme=|FILE|scheme/forts_scheme.ini|FORTS_PART_REPL
    FORTS_REFDATA_REPL:
      settings: p2repl://FORTS_REFDATA_REPL;scheme=|FILE|scheme/forts_scheme.ini|FORTS_REFDATA_REPL
  tiny_order:
    isin_id: 123456
    broker_code: BRK1
    client_code: CL1
    side: buy
    price: "1.00000"
    quantity: 1
    max_quantity: 1
    ext_id: 700001
    client_transaction_id_prefix: p5e-synth
    comment: p5e-synth
