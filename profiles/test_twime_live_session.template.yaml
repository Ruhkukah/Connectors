version: 1
profile_id: test_twime_live_session
environment: test
armed: false
test_network_armed_required: true
test_session_armed_required: true
profile_neutral_coverage: true
broker_topology:
  mode: unknown
  order_path: unknown
  market_data_path: unknown
  router_location: unknown
shadow_mode:
  enabled: false
  primary_source: native_moex
  native_connectors_read_only: true
connectors:
  market_data: []
  orders:
    - twime_trade
  state: []
twime_tcp:
  enabled: true
  endpoint:
    host: TEST_ENDPOINT_HOST_PLACEHOLDER
    port: 0
    allow_non_loopback: false
    allow_non_localhost_dns: false
  test_network_gate:
    external_test_endpoint_enabled: true
    require_explicit_runtime_arm: true
    block_production_like_hostnames: true
  credentials:
    source: env
    env_var: MOEX_TWIME_TEST_CREDENTIALS
twime_live_session:
  reconnect_enabled: false
  max_reconnect_attempts: 3
  establish_deadline_ms: 10000
  graceful_terminate_timeout_ms: 3000
