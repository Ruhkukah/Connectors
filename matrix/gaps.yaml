    notes: >-
      Phase 2D still does not route live or fake TWIME orders through the
      public C ABI or AlorEngine runtime path.
  - gap_id: gap_twime_non_loopback_endpoints_blocked
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5000_establish
    coverage_id: coverage_twime_non_loopback_block
    owner: phase2d_transport
    status: non_loopback_endpoints_blocked
    next_action: >-
      Keep non-loopback endpoints blocked in code and profile validation
      until a later phase explicitly introduces guarded exchange/broker
      connectivity.
    notes: >-
      Phase 2D transport defaults are localhost-only and reject hosts that
      look like MOEX or broker targets.
