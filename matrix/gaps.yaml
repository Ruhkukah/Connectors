  - gap_id: gap_twime_phase2a_no_tcp
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5000_establish
    coverage_id: coverage_twime_tcp_transport_local
    owner: phase2d_transport
    status: real_moex_connectivity_deferred
    next_action: >-
      Keep TCP transport limited to local loopback test servers until a
      later phase explicitly adds exchange-facing connectivity controls.
    notes: >-
      Phase 2D adds only a nonblocking local-only TCP transport skeleton.
      There are still no MOEX or broker endpoints in code, profiles, or CI.
  - gap_id: gap_twime_phase2a_no_session_fsm
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5001_establishmentack
    coverage_id: coverage_twime_session_tcp_loopback
    owner: phase2d_network
    status: real_moex_connectivity_deferred
    next_action: >-
      Keep live exchange session mode deferred; Phase 2D only wires the
      existing session FSM to local-only TCP loopback servers through the
      frame assembler.
    notes: >-
      Establish/Ack/Reject/Terminate/Sequence behavior now runs over fake
      frame transports, fake byte transports, and local-only TCP loopback
      sockets, but there is still no live exchange transport or production
      session mode.
  - gap_id: gap_twime_phase2a_no_recovery_cache
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5005_retransmission
    coverage_id: coverage_twime_fake_retransmission
    owner: phase2b_recovery
    status: real_tcp_deferred_phase2d
    next_action: >-
      Replace the in-memory bounded journals with durable recovery/cache
      plumbing in a later transport phase.
    notes: >-
      Phase 2B.2 now models pending retransmission windows and completion
      rules, but persists only in-memory fake recovery state and bounded
      journals for deterministic tests.
  - gap_id: gap_twime_phase2a_no_live_credentials
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5000_establish
    coverage_id: coverage_twime_tcp_transport_local
    owner: deployment_ops
    status: credentials_deferred
    next_action: >-
      Keep credentials and endpoint handling out of the public repo and any
      pre-production transport phases.
    notes: >-
      Phase 2D still uses only dummy local endpoints and synthetic config
      values; no live credentials exist anywhere in the repo.
  - gap_id: gap_twime_phase2a_no_order_routing
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_6000_newordersingle
    coverage_id: coverage_twime_new_order_day_offline
    owner: phase2d_connector
    status: live_order_routing_deferred
    next_action: >-
      Delay C ABI order-routing integration until a later connector phase
