    notes: >-
      The public certification procedure contains an old TWIME sample with
      version=2 and blockLength=46; the active offline codec follows schema
      version 7 from twime_spectra-7.7.xml.
  - gap_id: gap_broker_topology_unknown
    artifact_id: plaza_docs
    protocol_item_id: plaza2_twime_profile_neutrality
    coverage_id: coverage_shadow_mode
    owner: deployment_ops
    status: open
    next_action: Fill broker_topology answers using the questionnaire before enabling prod profiles.
    notes: Broker topology is intentionally unknown in Phase 0 and Phase 2A.
  - gap_id: gap_cgate_runtime_not_installed
    artifact_id: cgate_docs
    protocol_item_id: plaza2_scheme_lock
    coverage_id: coverage_plaza2_scheme_lock
    owner: native_runtime
    status: open
    next_action: >-
      Lock installed CGate scheme files into spec-lock/prod or spec-lock/test
      after runtime installation.
    notes: >-
      Local CGate runtime and scheme directories must be locked separately
      after installation.
  - gap_id: gap_twime_phase2a_no_tcp
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5000_establish
    coverage_id: coverage_twime_tcp_transport_local
    owner: phase2d_transport
    status: production_endpoint_support_deferred
    next_action: >-
      Keep TCP transport limited to loopback by default and gated external
      test endpoints only until a later phase explicitly adds production
      endpoint controls.
    notes: >-
      Phase 2E adds test-only endpoint gating and credential plumbing, but
      there are still no production endpoints or default non-loopback
      connectivity in code, profiles, or CI.
  - gap_id: gap_twime_phase2a_no_session_fsm
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5001_establishmentack
    coverage_id: coverage_twime_session_tcp_loopback
    owner: phase2d_network
    status: production_endpoint_support_deferred
    next_action: >-
      Keep live exchange session mode deferred; Phase 2D only wires the
      existing session FSM to local-only TCP loopback servers through the
      frame assembler.
    notes: >-
      Establish/Ack/Reject/Terminate/Sequence behavior now runs over fake
      frame transports, fake byte transports, and local-only TCP loopback
      sockets, but there is still no live exchange transport or production
      session mode.
  - gap_id: gap_twime_phase2a_no_recovery_cache
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5005_retransmission
    coverage_id: coverage_twime_fake_retransmission
    owner: phase2b_recovery
    status: real_tcp_deferred_phase2d
    next_action: >-
      Replace the in-memory bounded journals with durable recovery/cache
      plumbing in a later transport phase.
    notes: >-
      Phase 2B.2 now models pending retransmission windows and completion
      rules, but persists only in-memory fake recovery state and bounded
      journals for deterministic tests.
  - gap_id: gap_twime_phase2a_no_live_credentials
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5000_establish
    coverage_id: coverage_twime_credential_provider
    owner: deployment_ops
    status: credentials_deferred
    next_action: >-
      Keep credentials out of the public repo and continue loading them only
      from local env or file sources in test-only runs.
    notes: >-
      Phase 2E adds local env/file credential providers and redaction, but
      no credentials are checked in anywhere in the repo.
  - gap_id: gap_twime_phase2a_no_order_routing
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_6000_newordersingle
    coverage_id: coverage_twime_live_order_routing_default_disabled
    owner: phase2d_connector
    status: live_order_routing_deferred
    next_action: >-
      Delay C ABI order-routing integration until a later connector phase
      after local-only TCP transport and session behavior are completed.
    notes: >-
      Phase 2D still does not route live or fake TWIME orders through the
      public C ABI or AlorEngine runtime path.
  - gap_id: gap_twime_non_loopback_endpoints_blocked
    artifact_id: twime_prod_root
    protocol_item_id: twime_message_5000_establish
    coverage_id: coverage_twime_external_test_endpoint_support
    owner: phase2d_transport
    status: real_endpoint_support_deferred_phase2e
    next_action: >-
      Keep all non-loopback endpoints behind explicit test-network arming
      until a later phase introduces stricter exchange-facing endpoint
      approval and production separation.
    notes: >-
      Phase 2E allows external test endpoints only behind explicit runtime
      arming, credential loading, and test-only validation. Production
      endpoint support remains deferred.
