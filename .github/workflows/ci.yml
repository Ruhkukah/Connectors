name: ci

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  phase0-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Python requirements
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run ctest
        run: ctest --test-dir build --output-on-failure

      - name: Validate matrix
        run: build/tools/matrix_validate --matrix-dir matrix

      - name: Run cert runner stub
        run: build/apps/moex_cert_runner --scenario cert/stub/phase0_stub.yaml --output-dir build/ci-cert-runner

      - name: Verify prod profiles fail without arm
        run: |
          set +e
          build/tools/profile_check --profile profiles/prod_*.template.yaml
          status=$?
          set -e
          test "$status" -ne 0

      - name: Verify prod profiles pass with arm
        run: build/tools/profile_check --profile profiles/prod_*.template.yaml --armed
