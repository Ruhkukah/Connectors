name: ci

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  phase0-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Python requirements
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Guard hidden Unicode
        run: |
          python3 tools/unicode_guard.py \
            .github \
            CMakeLists.txt \
            include \
            src \
            protocols \
            connectors \
            tools \
            tests \
            matrix \
            profiles \
            cert \
            docs

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run ctest
        run: ctest --test-dir build --output-on-failure

      - name: Validate matrix
        run: build/tools/matrix_validate --matrix-dir matrix

      - name: Rebuild TWIME schema inventory
        run: build/tools/twime_schema_indexer --schema protocols/twime_sbe/schema/twime_spectra-7.7.xml --out matrix/protocol_inventory

      - name: Verify TWIME code generation
        run: build/tools/twime_codegen --schema protocols/twime_sbe/schema/twime_spectra-7.7.xml --out protocols/twime_sbe/generated --check

      - name: Verify TWIME fixture goldens
        run: build/tools/twime_fixture_check --fixtures tests/fixtures/twime_sbe --check

      - name: Verify TWIME source formatting
        run: |
          build/tools/source_style_check --require-clang-format \
            protocols/twime_sbe \
            tests/twime_sbe \
            tools/twime_codegen.py \
            tools/twime_schema_common.py \
            tools/twime_schema_indexer.py \
            tools/twime_schema_materialize.py

      - name: Run cert runner stub
        run: build/apps/moex_cert_runner --scenario cert/stub/phase0_stub.yaml --output-dir build/ci-cert-runner

      - name: Verify prod profiles fail without arm
        run: |
          set +e
          build/tools/profile_check --profile profiles/prod_*.template.yaml
          status=$?
          set -e
          test "$status" -ne 0

      - name: Verify prod profiles pass with arm
        run: build/tools/profile_check --profile profiles/prod_*.template.yaml --armed

  twime-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Configure sanitizer build
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -S . -B build-asan
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

      - name: Build sanitizer targets
        run: cmake --build build-asan

      - name: Run TWIME sanitizer tests
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: |
          ctest --test-dir build-asan --output-on-failure \
            -R "^(twime_.*|phase0_selfcheck|source_style_check)$"
