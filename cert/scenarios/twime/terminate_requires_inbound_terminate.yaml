scenario_id: twime_terminate_requires_inbound_terminate
title: Synthetic TWIME terminate requires inbound Terminate
metadata:
  owner: phase2b1
  mode: fake_transport
steps:
  - step_id: establish
    action: connect and inject EstablishmentAck
    expected: session becomes Active
  - step_id: terminate
    action: send client Terminate
    expected: session enters Terminating but is not cleanly terminated yet
  - step_id: peer_close
    action: close fake peer before inbound Terminate(Finished)
    expected: session faults and clean shutdown remains false
